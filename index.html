<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCA Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap');

        :root {
            --bg-main: #0A0E14;
            --bg-surface: #111827;
            --accent-teal: #2DD4BF;
            --accent-blue: #3B82F6;
            --accent-purple: #A855F7;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: #94a3b8;
            margin: 0;
            overflow: hidden;
        }

        .font-mono {
            font-family: 'Fira Code', monospace;
        }

        .dot-grid {
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }

        .glass-sidebar {
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(45, 212, 191, 0.2);
        }

        /* Override Prism styles for ultra-compact look */
        pre[class*="language-"] {
            margin: 0 !important;
            padding: 0 !important;
            background: transparent !important;
            font-size: 11px !important;
        }

        code[class*="language-"] {
            font-family: 'Fira Code', monospace !important;
            text-shadow: none !important;
        }

        /* Glowing path animations */
        @keyframes pulse-glow {
            0%, 100% {
                filter: drop-shadow(0 0 8px #2DD4BF) drop-shadow(0 0 15px #2DD4BF);
            }
            50% {
                filter: drop-shadow(0 0 15px #2DD4BF) drop-shadow(0 0 30px #2DD4BF);
            }
        }

        @keyframes path-pulse {
            0%, 100% {
                filter: drop-shadow(0 0 6px #2DD4BF);
                opacity: 1;
            }
            50% {
                filter: drop-shadow(0 0 12px #2DD4BF) drop-shadow(0 0 20px #2DD4BF);
                opacity: 0.8;
            }
        }

        /* Enrich button scanning animation */
        @keyframes scan-line {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(100%); opacity: 0; }
        }

        .scanning::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #a855f7, transparent);
            animation: scan-line 1.5s ease-in-out infinite;
        }

        /* Node expand/collapse animations */
        @keyframes node-pop-in {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes node-fade-out {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0; }
        }

        .node-expanding {
            animation: node-pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .node-collapsing {
            animation: node-fade-out 0.3s ease-out forwards;
        }

        /* Expand button pulse animation */
        @keyframes button-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .expand-button-pulse {
            animation: button-pulse 2s ease-in-out infinite;
        }

        /* Narrative screen animations */
        @keyframes narrative-pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px currentColor; }
            50% { opacity: 0.6; box-shadow: 0 0 16px currentColor; }
        }

        .narrative-pulse {
            animation: narrative-pulse 2s ease-in-out infinite;
        }

        @keyframes section-slide-in {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .section-slide-in {
            animation: section-slide-in 0.4s ease-out forwards;
        }

        .narrative-glow:focus-within {
            box-shadow: 0 0 20px -5px rgba(45, 212, 191, 0.2);
        }

        /* View mode cross-fade transition */
        .view-crossfade-enter {
            animation: crossfade-in 200ms ease-out forwards;
        }

        @keyframes crossfade-in {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* Segmented control for view mode switcher */
        .view-switcher {
            display: flex;
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 3px;
            gap: 2px;
        }

        .view-switcher button {
            position: relative;
            padding: 6px 14px;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            color: #64748b;
        }

        .view-switcher button:hover {
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.03);
        }

        .view-switcher button.active {
            color: #0A0E14;
            box-shadow: 0 0 12px -2px var(--glow-color, #2DD4BF);
        }

        .view-switcher button.active::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 25%;
            right: 25%;
            height: 2px;
            background: var(--glow-color, #2DD4BF);
            border-radius: 1px;
            box-shadow: 0 0 8px var(--glow-color, #2DD4BF);
        }

        /* Glassmorphism effect for synthesis panel */
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>

</head>

</html>
